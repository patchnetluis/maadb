version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      types:
        patterns:
          - "@types/*"
      dev-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major bumps require deliberate review; reject auto-PRs for them.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
