name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # Required for npm Trusted Publishers (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish   # Required-reviewer gate; configure in repo Settings → Environments
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches package.json version $PKG_VERSION"

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PKG_VERSION" == *-* ]]; then
            # Any version with a hyphen is a pre-release (e.g. 0.7.10-rc.1,
            # 0.8.0-alpha.2). Route to the `next` dist-tag so `npm install
            # @maadb/core` continues to pick up the latest stable release
            # rather than the pre-release.
            echo "tag=next" >> "$GITHUB_OUTPUT"
            echo "Pre-release version $PKG_VERSION → publishing to dist-tag 'next'"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "Stable version $PKG_VERSION → publishing to dist-tag 'latest'"
          fi

      - name: Publish to npm
        run: npm publish --provenance --tag "${{ steps.dist-tag.outputs.tag }}"
        # No NODE_AUTH_TOKEN — Trusted Publishers (OIDC) handles auth via id-token: write.
        # If Trusted Publisher is not yet configured for this package on npm, this step
        # will fail with an auth error. Configure at:
        # https://www.npmjs.com/package/@maadb/core/access
