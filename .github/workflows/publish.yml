name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # Required for npm Trusted Publishers (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish   # Required-reviewer gate; configure in repo Settings → Environments
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches package.json version $PKG_VERSION"

      - name: Publish to npm
        run: npm publish --provenance
        # No NODE_AUTH_TOKEN — Trusted Publishers (OIDC) handles auth via id-token: write.
        # If Trusted Publisher is not yet configured for this package on npm, this step
        # will fail with an auth error. Configure at:
        # https://www.npmjs.com/package/@maadb/core/access
